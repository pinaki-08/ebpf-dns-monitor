apiVersion: v1
kind: Namespace
metadata:
  name: dnsmon
  labels:
    # Allow privileged pods even when Pod Security Admission is enforced.
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dnsmon
  namespace: dnsmon
  labels:
    app: dnsmon
spec:
  selector:
    matchLabels:
      app: dnsmon
  template:
    metadata:
      labels:
        app: dnsmon
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2112"
        prometheus.io/path: "/metrics"
    spec:
      # hostNetwork puts the metrics endpoint on the node IP (the headless
      # Service below resolves to node IPs). The cgroup/skb attach itself does
      # not need it -- it hooks the node's root cgroup, mounted into the pod.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists # run on every node, including control-plane
      containers:
        - name: dnsmon
          image: dnsmon:dev
          imagePullPolicy: IfNotPresent
          # Attaches cgroup/skb at the node's root cgroup
          # (default -cgroup=/sys/fs/cgroup, mounted from the host below).
          args: ["-v"]
          ports:
            - name: metrics
              containerPort: 2112
              protocol: TCP
          securityContext:
            # Simplest for testing. Least-privilege alternative:
            #   capabilities: { add: ["BPF", "PERFMON", "NET_ADMIN", "SYS_RESOURCE"] }
            privileged: true
          volumeMounts:
            # The node's real cgroup v2 root; attaching here covers every pod and
            # host process on the node. Read-only is enough to attach a program.
            - name: cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
      volumes:
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: dnsmon-metrics
  namespace: dnsmon
  labels:
    app: dnsmon
spec:
  clusterIP: None # headless; endpoints are the node IPs (hostNetwork)
  selector:
    app: dnsmon
  ports:
    - name: metrics
      port: 2112
      targetPort: 2112
